name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM
        run: cargo build --target wasm32-unknown-emscripten --features wasm --release

      - name: Assemble site
        run: |
          mkdir -p _site
          cp web/* _site/
          cp target/wasm32-unknown-emscripten/release/brayton.wasm _site/

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
